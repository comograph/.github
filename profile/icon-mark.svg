<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="nodeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C9E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00C9E8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Orbit rings suggesting a globe / network sphere -->
  <ellipse cx="100" cy="100" rx="78" ry="78" fill="none" stroke="#1E2D42" stroke-width="1"/>
  <ellipse cx="100" cy="100" rx="78" ry="32" fill="none" stroke="#243347" stroke-width="1"/>
  <ellipse cx="100" cy="100" rx="32" ry="78" fill="none" stroke="#243347" stroke-width="1"/>

  <!-- Connector lines: collaboration graph -->
  <g stroke="#00C9E8" stroke-width="1.1" stroke-opacity="0.55" fill="none">
    <line x1="100" y1="22" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="171" y2="65"/>
    <line x1="100" y1="100" x2="171" y2="135"/>
    <line x1="100" y1="100" x2="100" y2="178"/>
    <line x1="100" y1="100" x2="29" y2="135"/>
    <line x1="100" y1="100" x2="29" y2="65"/>
    <line x1="100" y1="22" x2="171" y2="65"/>
    <line x1="171" y1="65" x2="171" y2="135"/>
    <line x1="171" y1="135" x2="100" y2="178"/>
    <line x1="100" y1="178" x2="29" y2="135"/>
    <line x1="29" y1="135" x2="29" y2="65"/>
    <line x1="29" y1="65" x2="100" y2="22"/>
  </g>

  <!-- Outer nodes -->
  <circle cx="100" cy="22" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="100" cy="22" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <circle cx="171" cy="65" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="171" cy="65" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <circle cx="171" cy="135" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="171" cy="135" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <circle cx="100" cy="178" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="100" cy="178" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <circle cx="29" cy="135" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="29" cy="135" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <circle cx="29" cy="65" r="6.5" fill="url(#nodeglow)"/>
  <circle cx="29" cy="65" r="4" fill="#0D1117" stroke="#00C9E8" stroke-width="1.6"/>

  <!-- Center node: largest, solid - represents the platform / verified core -->
  <circle cx="100" cy="100" r="13" fill="url(#nodeglow)"/>
  <circle cx="100" cy="100" r="9" fill="#00C9E8"/>
  <circle cx="100" cy="100" r="9" fill="none" stroke="#0D1117" stroke-width="1.5"/>
</svg>
